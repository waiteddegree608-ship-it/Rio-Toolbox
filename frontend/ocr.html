<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR 翻译助手 - Rio Toolbox</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body class="gradient gradient-aurora">
    <div class="background-overlay"></div>
    <header class="page-header">
        <nav class="breadcrumb">
            <a href="/" class="breadcrumb-link">工具箱首页</a>
            <span class="breadcrumb-separator">/</span>
            <span>OCR 翻译助手</span>
        </nav>
        <div class="theme-controller">
            <label for="gradient-select">主题背景</label>
            <select id="gradient-select" aria-label="选择渐变主题">
                <option value="gradient-aurora">Aurora</option>
                <option value="gradient-dusk">Dusk</option>
                <option value="gradient-ocean">Ocean</option>
                <option value="gradient-mauve">Mauve</option>
            </select>
        </div>
    </header>
    <main class="main-container ocr-grid">
        <section class="glass-panel ocr-upload" aria-labelledby="ocr-upload-title">
            <div class="panel-header">
                <h1 id="ocr-upload-title">文件识别与翻译</h1>
            </div>
            <div class="panel-content">
                <p class="muted">拖拽或点击上传扫描件、截图或 PDF 文档，系统会先识别文字后交给 AI 翻译，并生成可下载的结果文件。</p>
                <div id="ocr-drop-zone" class="ocr-drop-zone" role="button" tabindex="0">
                    <input type="file" id="ocr-file-input" accept=".png,.jpg,.jpeg,.webp,.bmp,.tiff,.pdf" hidden>
                    <p class="drop-icon">⬆</p>
                    <p class="drop-title">拖入文件到此处</p>
                    <p class="muted">或点击选择文件，支持 PNG / JPG / JPEG / WEBP / BMP / TIFF / PDF</p>
                    <button type="button" class="ghost-button" id="ocr-select-file">选择文件</button>
                </div>
                <p class="muted">若已将文件放至 <code>backend/uploads/ocr/input</code>，可直接执行批量处理。</p>
                <div class="ocr-inline-actions">
                    <button type="button" class="ghost-button" id="ocr-process-pending">批量处理输入文件夹</button>
                </div>
                <div id="ocr-status" class="ocr-status muted">等待上传文件</div>
            </div>
        </section>
        <section class="glass-panel ocr-result" aria-labelledby="ocr-result-title">
            <div class="panel-header">
                <h2 id="ocr-result-title">翻译结果</h2>
            </div>
            <div class="panel-content" id="ocr-result-body">
                <p class="muted">上传文件后，这里会展示 AI 翻译的标题、正文与下载链接。</p>
            </div>
            <div class="panel-footer" id="ocr-result-footer"></div>
        </section>
    </main>
    <footer class="page-footer">
        <span>Rio Toolbox · 你的私人物品栏</span>
    </footer>
    <script src="/assets/js/base.js"></script>
    <script src="/assets/js/ocr.js"></script>
</body>

</html>
